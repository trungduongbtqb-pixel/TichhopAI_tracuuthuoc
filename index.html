<!DOCTYPE html>
<html lang="vi">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pharma Copilot Quốc Gia - Phiên bản Trần V12</title>
    <style>
        :root {
            --primary-color: #0A0A0C;
            --secondary-color: #505A64;
            --accent-silver: #78828C;
            --bg-light: #F4F4F6;
            --text-dark: #1E1E20;
            --alert-red: #D90429;
            --alert-yellow: #FFB703;
            --alert-green: #2B9348;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); padding: 20px; transition: all 0.3s ease; }
        body.dark-mode { --bg-light: #121214; --text-dark: #E1E1E6; }

        header { background: var(--primary-color); color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: center; border-bottom: 4px solid var(--accent-silver); }
        header h1 { font-size: 20px; text-transform: uppercase; letter-spacing: 1px; }
        header p { font-style: italic; font-size: 13px; color: var(--accent-silver); margin-top: 5px; }

        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }

        .card { background: white; border: 1px solid #E1E1E6; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        body.dark-mode .card { background: #1E1E22; border-color: #29292E; }
        .card h2 { font-size: 15px; color: var(--secondary-color); margin-bottom: 15px; border-left: 4px solid var(--primary-color); padding-left: 8px; text-transform: uppercase; }

        label { display: block; font-weight: bold; margin: 10px 0 5px; font-size: 13px; }
        select, input, text-area { width: 100%; padding: 10px; border: 1px solid #CCC; border-radius: 4px; background: white; color: inherit; font-size: 14px; }
        body.dark-mode select, body.dark-mode input { background: #29292E; border-color: #3E3E43; }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 12px; transition: background 0.2s; }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-primary:hover { background: #252529; }
        .btn-toggle { background: var(--secondary-color); color: white; }

        /* V12 Banner Cảnh báo Động */
        .alert-banner-v12 { padding: 15px; border-radius: 6px; margin-bottom: 15px; display: none; border-left: 6px solid transparent; }
        .alert-red-active { display: block; background: #FFE3E3; color: #A6001A; border-color: var(--alert-red); animation: pulse 2s infinite; }
        .alert-yellow-active { display: block; background: #FFF3CD; color: #856404; border-color: var(--alert-yellow); }
        .alert-green-active { display: block; background: #D4EDDA; color: #155724; border-color: var(--alert-green); }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }

        /* Biểu đồ dòng tiền */
        .bar-container { margin-top: 15px; }
        .bar { height: 25px; border-radius: 4px; display: flex; align-items: center; padding-left: 10px; color: white; font-weight: bold; font-size: 12px; margin-bottom: 8px; transition: width 0.4s ease; }
        .bar-bhyt { background-color: var(--alert-green); }
        .bar-oop { background-color: #E65100; }

        /* Giỏ thuốc */
        .drug-tag { display: inline-flex; align-items: center; background: #E1E1E6; padding: 5px 10px; border-radius: 20px; font-size: 13px; margin: 5px; font-weight: bold; }
        body.dark-mode .drug-tag { background: #29292E; }
        .remove-drug { margin-left: 8px; color: var(--alert-red); cursor: pointer; }

        /* Chatbot */
        #aiPopup { background: #FFF; border: 1px solid var(--accent-silver); border-radius: 8px; padding: 15px; height: 200px; overflow-y: auto; font-size: 13px; line-height: 1.5; background: #FAFAFA; }
        body.dark-mode #aiPopup { background: #161619; }
    </style>
</head>
<body>

    <header>
        <h1>AI Pharma Copilot Quốc Gia - Trần Công Nghệ V12</h1>
        <p>Hệ Thống Tự Chủ Y Lệnh & Điều Phối Dược Kỹ Thuật Số Toàn Năng (Sovereignty Singularity v12)</p>
        <div style="margin-top: 10px;">
            <button class="btn-toggle" onclick="toggleTheme()" style="max-width: 150px; padding: 5px;">🌙 Đổi Chế Độ</button>
        </div>
